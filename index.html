<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capela Santa Helena</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
    :root{
      --gold:#b07d2e;--gold-bg:#f5ede0;--bg:#f7f5f2;--white:#fff;
      --gray:#6b7280;--border:#e5e0d8;--text:#1a1a1a;
      --danger:#dc2626;--success:#16a34a;
    }
    body{background:var(--bg);}
    #tela-login{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#2d1b0e);}
    .login-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.4);text-align:center;}
    .login-logo{width:72px;height:72px;border-radius:16px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;}
    .login-box h1{font-size:20px;font-weight:800;margin-bottom:4px;}
    .login-box p{font-size:12px;color:var(--gray);margin-bottom:20px;}
    .login-box input{width:100%;padding:11px;border-radius:10px;border:1px solid var(--border);font-size:14px;margin-bottom:10px;outline:none;display:block;}
    .login-box button{width:100%;padding:12px;border-radius:10px;border:none;background:var(--gold);color:#fff;font-weight:700;font-size:15px;cursor:pointer;}
    .login-dica{margin-top:10px;font-size:11px;color:var(--gray);}
    #app{display:none;height:100vh;overflow:hidden;}
    .layout{display:flex;height:100vh;}
    .sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
    .sidebar-logo{padding:16px 14px;border-bottom:1px solid var(--border);}
    .sidebar-logo-box{display:flex;align-items:center;gap:10px;}
    .sidebar-logo-icon{width:40px;height:40px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .sidebar-logo-text h2{font-size:13px;font-weight:800;}
    .sidebar-logo-text p{font-size:11px;color:var(--gray);}
    .sidebar-usuario{font-size:11px;color:var(--gray);padding:8px 14px 0;}
    .sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray);margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;}
    .nav-item:hover{background:var(--gold-bg);color:var(--gold);}
    .nav-item.ativo{background:var(--gold);color:#fff;}
    .sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);}
    .nav-sair{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--gray);border:none;background:transparent;width:100%;text-align:left;}
    .nav-sair:hover{background:#fee2e2;color:var(--danger);}
    .main{flex:1;overflow-y:auto;background:var(--bg);}
    .pagina{display:none;}
    .pagina.ativa{display:block;}
    .page-header{padding:16px 20px;background:#fff;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .page-header h2{font-size:17px;font-weight:800;}
    .btn-novo{padding:8px 14px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:16px 20px;}
    .dash-card{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--border);}
    .dash-card .di{font-size:24px;margin-bottom:6px;}
    .dash-card .dv{font-size:20px;font-weight:800;color:var(--gold);}
    .dash-card .dl{font-size:11px;color:var(--gray);margin-top:2px;}
    .dash-card .ds{font-size:11px;color:var(--danger);margin-top:2px;}
    .venda-layout{display:flex;height:100vh;}
    .venda-esq{flex:1;padding:14px;overflow-y:auto;border-right:1px solid var(--border);}
    .venda-dir{width:320px;min-width:320px;background:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .venda-filtros{display:flex;gap:8px;margin-bottom:12px;}
    .v-busca{flex:1;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:7px 10px;}
    .v-busca input{border:none;outline:none;font-size:13px;flex:1;}
    .v-cat{padding:7px 10px;border-radius:10px;border:1px solid var(--border);font-size:12px;background:#fff;outline:none;}
    .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
    .prod-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:10px;cursor:pointer;transition:all 0.15s;}
    .prod-card:hover{border-color:var(--gold);transform:translateY(-2px);}
    .prod-card-foto{width:100%;height:85px;border-radius:8px;margin-bottom:7px;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;}
    .prod-card-foto img{width:100%;height:100%;object-fit:cover;}
    .prod-card-nome{font-size:11px;font-weight:700;margin-bottom:2px;}
    .prod-card-preco{font-size:13px;font-weight:700;color:var(--gold);}
    .prod-card-est{font-size:10px;color:var(--gray);}
    .carr-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .carr-header h3{font-size:14px;font-weight:700;}
    .carr-qtd{font-size:12px;color:var(--gray);}
    .carr-itens{flex:1;overflow-y:auto;padding:8px 10px;}
    .carr-vazio{text-align:center;color:var(--gray);font-size:13px;padding:24px 0;}
    .carr-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;background:var(--bg);}
    .carr-item-foto{width:40px;height:40px;border-radius:8px;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
    .carr-item-foto img{width:100%;height:100%;object-fit:cover;}
    .carr-item-info{flex:1;min-width:0;}
    .carr-item-nome{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .carr-item-preco{font-size:12px;color:var(--gold);font-weight:700;}
    .qtd-ctrl{display:flex;align-items:center;gap:4px;}
    .qtd-btn{width:22px;height:22px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
    .qtd-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
    .qtd-n{font-size:12px;font-weight:600;min-width:16px;text-align:center;}
    .carr-footer{padding:10px 12px;border-top:1px solid var(--border);}
    .pag-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
    .btn-pag{padding:8px 6px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;}
    .btn-pag.sel{background:var(--gold);color:#fff;border-color:var(--gold);}
    .totais{margin-bottom:8px;}
    .totais-row{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);padding:3px 0;}
    .totais-row.tot{font-size:15px;font-weight:800;color:var(--text);padding-top:6px;border-top:1px solid var(--border);margin-top:4px;}
    .totais-row.tot span:last-child{color:var(--gold);}
    .desc-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .desc-row span{font-size:12px;font-weight:700;color:var(--gold);}
    .desc-row input{flex:1;padding:6px 8px;border-radius:8px;border:1px solid var(--border);font-size:12px;outline:none;}
    .troco-row{margin-bottom:8px;}
    .troco-row label{font-size:11px;color:var(--gray);display:block;margin-bottom:3px;}
    .troco-row input{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;}
    .troco-info{font-size:12px;font-weight:600;text-align:center;margin-bottom:4px;}
    .btn-finalizar{width:100%;padding:11px;border-radius:12px;border:none;background:var(--gold);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
    .btn-finalizar:disabled{background:#d1d5db;cursor:not-allowed;}
    .btn-limpar{width:100%;padding:8px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;margin-top:5px;}
    .alerta{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#facc15;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3);white-space:nowrap;}
  </style>
</head>
<body>
<div class="alerta" id="alerta"></div>

<div id="tela-login">
  <div class="login-box">
    <div class="login-logo">⛪</div>
    <h1>Capela Santa Helena</h1>
    <p>Sistema de Vendas e Estoque</p>
    <input id="l-user" type="text" placeholder="Usuário" autocomplete="off"/>
    <input id="l-pass" type="password" placeholder="Senha"/>
    <button onclick="fazerLogin()">ENTRAR</button>
    <p class="login-dica">admin / 1234 &nbsp;·&nbsp; caixa / 0000</p>
  </div>
</div>

<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-box">
          <div class="sidebar-logo-icon">⛪</div>
          <div class="sidebar-logo-text">
            <h2>Capela Santa Helena</h2>
            <p>Artigos Religiosos</p>
          </div>
        </div>
      </div>
      <div class="sidebar-usuario" id="sb-user"></div>
      <nav class="sidebar-nav">
        <button class="nav-item ativo" onclick="ir('venda')">🛒 Venda</button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-sair" onclick="fazerLogout()">↩ Sair</button>
      </div>
    </aside>

    <main class="main">
      <div class="pagina ativa" id="pg-venda">
        <div class="venda-layout">
          <div class="venda-esq">
            <div class="venda-filtros">
              <div class="v-busca">🔍<input id="v-busca" type="text" placeholder="Buscar produto..."/></div>
              <select class="v-cat" id="v-cat">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="prod-grid" id="prod-grid"></div>
          </div>
          <div class="venda-dir">
            <div class="carr-header"><h3>🛒 Carrinho</h3><span class="carr-qtd" id="carr-qtd">0 itens</span></div>
            <div class="carr-itens" id="carr-itens"><div class="carr-vazio">Adicione produtos ao carrinho</div></div>
            <div class="carr-footer">
              <div class="desc-row"><span>%</span><input id="v-desc" type="number" min="0" max="100" placeholder="Desconto %"/></div>
              <div class="pag-grid">
                <button class="btn-pag" id="pp-pix">📱 PIX</button>
                <button class="btn-pag" id="pp-dinheiro">💵 Dinheiro</button>
                <button class="btn-pag" id="pp-debito">💳 Débito</button>
                <button class="btn-pag" id="pp-credito">💳 Crédito</button>
              </div>
              <div class="totais">
                <div class="totais-row"><span>Subtotal</span><span id="v-sub">R$ 0,00</span></div>
                <div class="totais-row"><span>Desconto</span><span id="v-descval">R$ 0,00</span></div>
                <div class="totais-row tot"><span>Total</span><span id="v-total">R$ 0,00</span></div>
              </div>
              <button class="btn-finalizar" id="btn-fin" disabled>✅ Finalizar Venda</button>
              <button class="btn-limpar">🗑️ Limpar carrinho</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  let usuario = null;
  function alerta(msg){
    const el = document.getElementById('alerta');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(alerta._t);
    alerta._t = setTimeout(() => { el.style.display = 'none'; }, 2500);
  }
  function fazerLogin(){
    const u = document.getElementById('l-user').value.trim();
    const s = document.getElementById('l-pass').value.trim();
    if((u === 'admin' && s === '1234') || (u === 'caixa' && s === '0000')){
      usuario = u;
      document.getElementById('tela-login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('sb-user').textContent = '👤 ' + (u === 'admin' ? 'Administrador' : 'Caixa');
    }else{
      alerta('❌ Usuário ou senha incorretos');
    }
  }
  function fazerLogout(){
    usuario = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('tela-login').style.display = 'flex';
    document.getElementById('l-user').value = '';
    document.getElementById('l-pass').value = '';
  }
  function ir(pg){
    // versão mínima só com tela de venda
  }
</script>
</body>
</html>
